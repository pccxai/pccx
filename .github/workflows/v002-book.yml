name: v002-book

on:
  # Disabled automatic runs in this docs repo.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PDF_PATH: _build/v002-book/pdf/pccx-v002-book-preprint.pdf

jobs:
  build:
    # Completely disabled in this docs repo.
    # The private book build with token requirement was causing repeated "run failed".
    # This repo no longer wants this noise.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read

    steps:
      - name: Check out docs repo
        uses: actions/checkout@v4

      - name: Clone v002 RTL source for literalincludes
        env:
          GH_TOKEN: ${{ secrets.PCCX_BOOKS_RELEASE_TOKEN }}
        run: |
          test -n "$GH_TOKEN" || {
            echo "PCCX_BOOKS_RELEASE_TOKEN is required to read the private v002 source." >&2
            exit 1
          }
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/pccx-internal/pccx-v002.git" codes/v002

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            graphviz \
            latexmk \
            poppler-utils \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-korean \
            texlive-latex-extra \
            texlive-pictures \
            texlive-science

      - name: Install Sphinx dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build private v002 book PDF
        run: bash tools/build_v002_book_pdf.sh

      - name: Sanity check PDF
        run: |
          test -s "$PDF_PATH"
          pages="$(pdfinfo "$PDF_PATH" | awk '/^Pages:/ {print $2}')"
          echo "Built PDF has ${pages:-0} page(s)."
          test "${pages:-0}" -ge 20
          python - "$PDF_PATH" <<'PY'
          import subprocess
          import sys

          pdf = sys.argv[1]
          text = subprocess.check_output(["pdftotext", pdf, "-"], text=True, errors="ignore")
          blocked = ["NVI" + "DIA", "In" + "tel", "in" + "tel", "reg" + "istered", chr(174)]
          hits = [term for term in blocked if term in text]
          if hits:
              print("Blocked term found in extracted PDF text.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Create private release asset
        env:
          GH_TOKEN: ${{ secrets.PCCX_BOOKS_RELEASE_TOKEN }}
        run: |
          test -n "$GH_TOKEN" || {
            echo "PCCX_BOOKS_RELEASE_TOKEN is required to publish the private book release." >&2
            exit 1
          }
          stamp="$(date -u +%Y-%m-%dT%H%M%SZ)"
          tag="v002-book-preprint-${stamp}"
          gh release create "$tag" "$PDF_PATH" \
            --repo pccx-internal/pccx-books-private \
            --target artifact/v002-book-release-anchor \
            --title "v002 book preprint ${stamp}" \
            --notes "v002 book preprint ${stamp}"
